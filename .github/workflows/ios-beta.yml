name: iOS Beta Build & Upload

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-14 # macOS-14 barqarorroq
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate & Provisioning Profile
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          browser-domain: apple.com # Bu keychain ochilishini osonlashtiradi

      - name: Install Provisioning Profile Manually
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build and Upload using Fastlane
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # ExportOptions dagi Team ID ni yangilaymiz (agar u erda XXXXXXXXXX bo'lsa)
          sed -i '' "s/XXXXXXXXXX/$TEAM_ID/g" ios/ExportOptions.plist
          
          # Flutter build (faqat tayyorlash uchun)
          flutter build ios --release --no-codesign
          
          # Fastlane orqali imzolash va TestFlight-ga yuklash
          cd ios && bundle install && bundle exec fastlane beta
