name: iOS Beta Build & Upload

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      manual_run:
        description: 'Manual Trigger'
        required: false
        default: 'true'

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 -D > certificate.p12
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build and Upload using Fastlane
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.ITC_TEAM_ID }}
          FASTLANE_TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          sed -i '' "s/XXXXXXXXXX/$TEAM_ID/g" ios/ExportOptions.plist
          flutter build ios --release --no-codesign
          cd ios && bundle install && bundle exec fastlane beta

